# Configuration for geometric alignment between virtual IMU and real IMU.
# Quick reference:
# - `fit_from_current_pair: true` => learns one rotation per capture
# - `fit_from_current_pair: false` => reuses transforms from outside the current clip

# Enables or disables the entire module.
enable: true

# Estimates a small temporal delay before fitting.
enable_time_lag_estimation: true
# Estimates the 3D rotation between virtual and real.
enable_rotation_alignment: true
# Opens the door for bias/scale refinement.
enable_bias_scale_refinement: true

# Keeps lag search active. Generally leave `true`.
estimate_time_lag: true
# Maximum lag in number of samples.
max_lag_samples: 20
# Which signal to use for lag detection: `gyro_norm` or `acc_norm`.
lag_signal: "gyro_norm"

# Uses accelerometer in the fit.
use_acc: true
# Uses gyroscope in the fit.
use_gyro: true
# Adjusts bias per axis. Only applies if refinement is enabled.
use_bias: false
# Adjusts scale per axis. Only applies if refinement is enabled.
use_scale: true

# If `true`, favors near-static windows to leverage gravity.
gravity_window_only: true
# Minimum gyro motion norm to consider a sample informative.
min_motion_norm_gyro: 0.5 # original 0.1
# Minimum acc norm to consider a sample informative.
min_motion_norm_acc: 0.2
# Small numerical regularization for the fit.
ridge_lambda: 1.0e-6

# Base directory for saving alignment artifacts.
output_dir: "./output/imu_alignment"
# Saves the learned transforms JSON.
save_transforms: false
# Saves alignment metrics and reports.
save_metrics: true
# `true` = fit on current pair, per capture. `false` = use/reuse external transforms.
fit_from_current_pair: true
# Fixed path to a transforms JSON. `null` uses the default path from the current output.
transforms_path: null
